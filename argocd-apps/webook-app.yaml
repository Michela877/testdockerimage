apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-hello-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Michela877/testdockerimage.git
    targetRevision: main
    path: apps/flask-hello

  destination:
    server: https://kubernetes.default.svc
    namespace: flask-hello

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
